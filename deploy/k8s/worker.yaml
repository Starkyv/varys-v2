apiVersion: apps/v1
kind: Deployment
metadata:
  name: varys-worker
  namespace: varys
  labels: { app: varys-worker }
spec:
  # The worker pulls run jobs off pg-boss (Postgres). pg-boss distributes work, so
  # this can scale to N replicas for more concurrent runs. No Service — it has no
  # inbound HTTP. Same image as the API, different command.
  replicas: 1
  selector:
    matchLabels: { app: varys-worker }
  template:
    metadata:
      labels: { app: varys-worker }
    spec:
      securityContext:
        runAsNonRoot: true
        # Image's `varys` user is UID 10001 (named users fail the non-root check).
        runAsUser: 10001
      containers:
        - name: worker
          image: dgvarysacr.azurecr.io/varys-app:v1   # same image as the API
          workingDir: /app/apps/worker
          command: ["/app/node_modules/.bin/tsx", "src/main.ts"]
          envFrom:
            - configMapRef: { name: varys-config }
            - secretRef: { name: varys-secrets }
          resources:
            # Replaying runs drives a real Chromium. Keep the scheduling REQUEST low
            # (this dev cluster is CPU-constrained) while still allowing it to burst
            # up to the LIMIT at run time.
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }
          volumeMounts:
            # Chromium crashes on the default 64MB /dev/shm during a run.
            - { name: dev-shm, mountPath: /dev/shm }
      volumes:
        - name: dev-shm
          emptyDir: { medium: Memory, sizeLimit: 1Gi }
