apiVersion: apps/v1
kind: Deployment
metadata:
  name: varys-web
  namespace: varys
  labels: { app: varys-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: varys-web }
  template:
    metadata:
      labels: { app: varys-web }
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: web
          image: dgvarysacr.azurecr.io/varys-web:v1
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: varys-web
  namespace: varys
  labels: { app: varys-web }
spec:
  selector: { app: varys-web }
  ports:
    - { name: http, port: 80, targetPort: http }
