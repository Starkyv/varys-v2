# Tells cert-manager how to obtain TLS certs (free, auto-renewing) from Let's Encrypt.
# ClusterIssuer is cluster-scoped (shared across namespaces). Apply ONLY if
# `kubectl get clusterissuer` doesn't already list a usable prod issuer — if one
# exists under a different name, use that name in ingress.yaml instead and skip this.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production endpoint.
    server: https://acme-v02.api.letsencrypt.org/directory
    # Where expiry/renewal notices go.
    email: mothil@datagenie.ai
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      # Proves domain ownership over HTTP via the nginx ingress.
      - http01:
          ingress:
            ingressClassName: nginx
