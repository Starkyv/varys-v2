# TEMPLATE — copy to secret.yaml, fill in real values, and apply. Do NOT commit the
# filled-in file (secret.yaml is gitignored). Prefer creating it imperatively:
#
#   kubectl -n varys create secret generic varys-secrets \
#     --from-literal=DATABASE_URL='postgres://<appuser>:<pwd>@<host>:5432/<db>?sslmode=require' \
#     --from-literal=BETTER_AUTH_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=AZURE_STORAGE_SAS_TOKEN='<sas-query-string>' \
#     --from-literal=GOOGLE_CLIENT_ID='<client-id>' \
#     --from-literal=GOOGLE_CLIENT_SECRET='<client-secret>'
#
apiVersion: v1
kind: Secret
metadata:
  name: varys-secrets
  namespace: varys
type: Opaque
stringData:
  # Postgres — note the mandatory ?sslmode=require for Azure.
  DATABASE_URL: "postgres://<appuser>:<password>@<host>:5432/<db>?sslmode=require"
  # better-auth session signing key — generate: openssl rand -base64 32
  BETTER_AUTH_SECRET: "<random-secret>"
  # Azure Blob SAS token (the query string only; leading ? optional).
  AZURE_STORAGE_SAS_TOKEN: "<sas-query-string>"
  # Google OAuth client credentials.
  GOOGLE_CLIENT_ID: "<client-id>"
  GOOGLE_CLIENT_SECRET: "<client-secret>"
