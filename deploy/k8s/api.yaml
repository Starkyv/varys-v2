apiVersion: apps/v1
kind: Deployment
metadata:
  name: varys-api
  namespace: varys
  labels: { app: varys-api }
spec:
  # Kept at 1: the API holds live-authoring browser sessions in memory and is the
  # sole applier of the boot-time schema DDL. Auth sessions are in Postgres, so
  # scaling out is otherwise fine — but enable Ingress sticky sessions first so an
  # in-flight authoring session stays on one pod.
  replicas: 1
  selector:
    matchLabels: { app: varys-api }
  template:
    metadata:
      labels: { app: varys-api }
    spec:
      securityContext:
        runAsNonRoot: true
        # Image's `varys` user is UID 10001. Stated numerically so the kubelet can
        # verify it's non-root (a username alone fails that check).
        runAsUser: 10001
      containers:
        - name: api
          image: dgvarysacr.azurecr.io/varys-app:v1
          workingDir: /app/apps/api
          command: ["/app/node_modules/.bin/tsx", "src/main.ts"]
          ports:
            - { name: http, containerPort: 4000 }
          envFrom:
            - configMapRef: { name: varys-config }
            - secretRef: { name: varys-secrets }
          # Slow first boot (tsx compile + idempotent schema apply) — gate traffic on startup.
          startupProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          volumeMounts:
            # Chromium (authoring live-preview) crashes on the default 64MB /dev/shm.
            - { name: dev-shm, mountPath: /dev/shm }
      volumes:
        - name: dev-shm
          emptyDir: { medium: Memory, sizeLimit: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: varys-api
  namespace: varys
  labels: { app: varys-api }
spec:
  selector: { app: varys-api }
  ports:
    - { name: http, port: 4000, targetPort: http }
