# Static SPA serving with history-API fallback. No API proxying here — the Ingress
# routes API path prefixes to the API Service; this server only serves the bundle.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Self-served static downloads (the recorder extension zip). 404 when absent —
    # never fall through to the SPA, which would hand back index.html as a broken "zip".
    location /downloads/ {
        try_files $uri =404;
    }

    # Everything else falls back to index.html so client-side routes resolve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
