apiVersion: apps/v1
kind: Deployment
metadata:
  name: varys-web
  labels:
    app: varys-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: varys-web
  template:
    metadata:
      labels:
        app: varys-web
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/{{ .Values.image.webRepository }}:{{ .Values.image.webTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: varys-web
  labels:
    app: varys-web
spec:
  selector:
    app: varys-web
  ports:
    - name: http
      port: 80
      targetPort: http
